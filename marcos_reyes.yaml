        summary: Desarrollador Full Stack y asistente técnico, encargado de ayudar a docentes con la implementación de tecnología en el aula, reparación y mantenimiento de equipos, y desarrollo de soluciones digitales para mejorar la gestión escolar.
        highlights:
        - Refactoricé código espagueti legado en PHP implementando Laravel 13 con integración de Gemini, construyendo una plataforma escolar con módulos de asistencia, calificaciones, tareas y comunicación para docentes, estudiantes y apoderados.
        - Despliegué servicios de red internos mediante máquinas virtuales (Samba, DNS restrictivo, administración de impresoras), mejorando la seguridad y eficiencia operativa de la red escolar.
        - Participé en auditorías de seguridad, mantenimiento de equipos y configuración de plataformas digitales (Cloudflare, GitHub, hosting), garantizando la continuidad operativa del establecimiento.
        - Desarrollé documentación técnica y asistí a docentes en la adopción de tecnología en el aula, optimizando el uso de herramientas digitales en el entorno educativo.
      - company: Centro de Prácticas LastDon
        position: Desarrollador Full Stack / Director de Proyecto
        date:
        start_date: 2024-12
        end_date: 2025-02
        location: Remoto
        summary:
        highlights:
          - Lideré técnicamente un equipo de 5 desarrolladores bajo Agile/Scrum y Kanban, construyendo una plataforma de inventarios y ventas con React, Laravel y MySQL.
          - Diseñé e implementé un monolito desacoplado, reduciendo los tiempos de carga en un 30% mediante optimización de consultas, y el tiempo de salida a producción en un 40% con procesos estandarizados de lanzamiento.
          - Implementé GitHub Flow con revisión de código y mentoría técnica en PHP/Node.js, reduciendo el tiempo de incorporación del equipo en un 50% y las incidencias de uso en un 25%.
    proyectos:
      - name: '[ReyesHosting](https://reyeshosting.cl)'
        date: '2026'
        start_date: 2026-01
        location: En línea
        summary: Plataforma de servicios de hosting de videojuegos como Minecraft, con panel de administración personalizado.
        highlights:
          - Plataforma de comercio electrónico desarrollada con Laravel, TailwindCSS y Livewire, con integración de pasarelas de pago (Webpay y Stripe) y gestión de usuarios, planes y facturación.
          - Automatización del despliegue de servidores de juegos en VPS mediante scripts Bash y CI/CD, reduciendo los tiempos de aprovisionamiento en un 60%.
          - Implementación de soporte técnico vía tickets y chat en vivo, mejorando el tiempo de primera respuesta en un 40%, con monitoreo continuo y medidas de seguridad para protección de datos y transacciones.
