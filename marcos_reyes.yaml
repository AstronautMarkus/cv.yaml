    Perfil:
      - Soy desarrollador Full Stack y administrador de sistemas independiente, con experiencia en el ciclo completo SDLC (Software Development Life Cycle), desde el levantamiento de requerimientos hasta el despliegue y mantenimiento en nube y VPS.
      - Trabajo con metodologías Agile (Scrum y Kanban), planificación por sprints, liderazgo técnico y mentoría, desarrollando soluciones para PYMES con foco en optimización, seguridad, calidad de software y mejora continua basada en métricas.
      - Cuento con experiencia en la implementación de arquitecturas monolíticas desacopladas y microservicios, así como en el mantenimiento de servidores y servicios en producción, con monitoreo continuo y ajustes de infraestructura para garantizar la escalabilidad y el rendimiento óptimo de las aplicaciones.
